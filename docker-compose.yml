services:
  mongodb:
    image: mongo:latest
    container_name: tgv-analyse-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - tgv-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  tgv-simulator:
    build: ./tgv-data
    container_name: tgv-analyse-simulator
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=tgv_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - tgv-network
    restart: on-failure

  tgv-api:
    build: ./tgv-api
    container_name: tgv-analyse-api
    environment:
      - PORT=3000
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=tgv_db
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - tgv-network
    restart: on-failure

  tgv-dashboard:
    build: ./tgv-dashboard
    container_name: tgv-analyse-dashboard
    ports:
      - '8080:80'
    depends_on:
      - tgv-api
    networks:
      - tgv-network

volumes:
  mongo_data:

networks:
  tgv-network:
    driver: bridge
